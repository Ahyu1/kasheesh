<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#kash hbd yehey</title>
    <style>
        :root {
            --phone-bg: #000000;
            --screen-bg: #0c207b;
            --ios-blue: #007aff;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #0f0f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
        }

        /* iPhone Frame Container */
        .iphone-frame {
            width: 300px;
            height: 600px;
            background-color: var(--phone-bg);
            border-radius: 50px;
            padding: 13px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 
                        0 0 0 4px #333, 
                        0 0 0 8px #111;
            position: relative;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* Dynamic Island / Notch */
        .dynamic-island {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background-color: #000;
            border-radius: 20px;
            z-index: 10;
            transition: width 0.3s ease;
        }

        .dynamic-island:hover {
            width: 200px;
        }

        /* Screen Area */
        .iphone-screen {
            width: 100%;
            height: 100%;
            background-color: var(--screen-bg);
            border-radius: 38px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            animation: appOpen 0.45s ease;
        }

        @keyframes appOpen {
            from {
                transform: scale(0.85);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Status Bar */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-size: 14px;
            font-weight: 600;
            background-color: transparent;
            z-index: 5;
            pointer-events: none;
        }

        .status-right {
            display: flex;
            gap: 5px;
        }

        /* Scrollable Content Container */
        .scrollable-content {
            flex: 1;
            overflow-y: scroll;
            padding: 15px 20px 80px 20px; /* Space for home indicator */
            scroll-behavior: smooth;
            scrollbar-width: none; 
        }

        .scrollable-content::-webkit-scrollbar {
            display: none; 
        }

        /* App Header */
        .app-header {
            margin-top: 15px; /* Keeps the back arrow safely below status bar */
            margin-bottom: 15px;
        }

        /* Container & Video Adjustments */
        .container {
            padding: 12px;
            border-radius: 12px;
            border: 3px solid black;
            background-color: rgb(255, 255, 255);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container h3 {
            font-size: 13px;
            margin: 0 0 10px 0;
            text-align: start;
        }

        .container h2 {
            font-size: 12px;
            margin-top: 10px;
            text-align: start;
        }
        
        .container p {
            font-style: italic;
            font-size: 10px;
            text-align: center;
        }

        .container img {
            width: 160px;
            border-radius: 7px;;
        }


        /* Home Indicator Bar */
        .home-indicator-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(transparent, var(--screen-bg) 50%);
            cursor: pointer;
            z-index: 10;
        }

        .home-indicator {
            width: 140px;
            height: 5px;
            background-color: #000000;
            border-radius: 100px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .home-indicator-container:hover .home-indicator {
            opacity: 0.4;
        }

    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="dynamic-island"></div>

        <div class="iphone-screen">
            
            <div class="status-bar">
                <div class="status-left" id="clock">9:41</div>
                <div class="status-right">
                    <span>📶</span>
                    <span>🔋</span>
                </div>
            </div>

            <div class="scrollable-content" id="scrollContainer">
                
                <div class="app-header">
                    <a href="greeting-card.html"><img src="left.png" alt="Back"></a>
                </div>

                <div class="container">
                    <h3>~END</h3>
                    <p>that's all kash. i hope nagustuhan mo itong virtual present ko hehe. enjor your day, and the rest of your life!  byebyeee. </p>
                    <br>
                    <h3>PLEASE SCAN TO EVALUATE THIS WEBSITE BEFORE YOU EXIT:</h3>
                    <img src="qrbleh.png">
                    <br>
                    <p>-coded with a 🫀-</p>
                    
                    
                </div>

            </div>

            <div class="home-indicator-container" onclick="scrollToTop()">
                <div class="home-indicator"></div>
            </div>

        </div>
    </div>

    <script>
        // Real-time Clock Update
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            
            minutes = minutes < 10 ? '0' + minutes : minutes;
            
            const timeString = `${hours}:${minutes}`;
            document.getElementById('clock').textContent = timeString;
        }
        
        updateClock();
        setInterval(updateClock, 1000);

        // Functional Home Indicator: Scrolls back up
        function scrollToTop() {
            document.getElementById('scrollContainer').scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
