<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#kash hbd yehey</title>
    <style>
        :root {
            --phone-bg: #000000;
            --screen-bg: #121213;
            --ios-blue: #007aff;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #0f0f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
        }

        /* iPhone Frame Container */
        .iphone-frame {
            width: 300px;
            height: 600px;
            background-color: var(--phone-bg);
            border-radius: 50px;
            padding: 13px;

            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 
                        0 0 0 4px #333, 
                        0 0 0 8px #111;
            position: relative;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* Dynamic Island / Notch */
        .dynamic-island {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background-color: #000;
            border-radius: 20px;
            z-index: 10;
            transition: width 0.3s ease;
        }

        .dynamic-island:hover {
            width: 200px;
        }

        /* Screen Area */
        .iphone-screen {
            width: 100%;
            height: 100%;
            background-color: var(--screen-bg);
            border-radius: 38px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

       
        /* Scrollable Content Container */
        .scrollable-content {
            flex: 1;
            overflow-y: scroll;
            padding: 15px 20px 80px 20px; /* Extra bottom padding for the home indicator */
            scroll-behavior: smooth;
            /* Hide default scrollbar for sleek iOS look */
            scrollbar-width: none; 
        }

        .scrollable-content::-webkit-scrollbar {
            display: none; 
        }

       


        /*===========*/
        .iphone-screen {
    animation: appOpen 0.45s ease;
}

@keyframes appOpen {
    from {
        transform: scale(0.85);
        opacity: 0;
    }

    to {
        transform: scale(1);
        opacity: 1;
    }
}

iframe {
    border-radius: 12px;
    width: 200px;
    height: 100px;
}
    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="dynamic-island"></div>

        <div class="iphone-screen">
            
       </div>
                
            </div>

        </div>
    </div>

    <script>
       

        // Functional Home Indicator: Scrolls back up
        function scrollToTop() {
            document.getElementById('scrollContainer').scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        //=================================
        let redirected = false;

document.addEventListener('wheel', (e) => {
    if (e.deltaY < -50 && !redirected) {
        redirected = true;

        document.querySelector('.iphone-screen').style.transition =
            'transform 0.4s ease, opacity 0.4s ease';

        document.querySelector('.iphone-screen').style.transform =
            'scale(1.15)';

        document.querySelector('.iphone-screen').style.opacity = '0';

        setTimeout(() => {
            window.location.href = 'index.html';
        }, 400);
    }
});

let startY = 0;

document.addEventListener('touchstart', (e) => {
    startY = e.touches[0].clientY;
});

document.addEventListener('touchend', (e) => {
    if (redirected) return;

    const distance = startY - e.changedTouches[0].clientY;

    if (distance > 100) {
        redirected = true;

        document.querySelector('.iphone-screen').style.transition =
            'transform 0.4s ease, opacity 0.4s ease';

        document.querySelector('.iphone-screen').style.transform =
            'scale(1.15)';

        document.querySelector('.iphone-screen').style.opacity = '0';

        setTimeout(() => {
            window.location.href = 'index.html';
        }, 400);
    }
});
    </script>
</body>
</html>
